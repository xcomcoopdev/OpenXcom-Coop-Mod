name: CI (build + coop tests + publish)

# FREE GitHub-hosted windows-latest. Builds x64 Release from a clean checkout,
# runs the coop harness headless, and publishes a rolling nightly (push to main)
# or a versioned release (push of a v* tag). Licensed UFO game data is pulled from the
# private OpenXcom-Coop/UFO_Data repo via a read-only deploy key (UFO_DATA_DEPLOY_KEY)
# and is STRIPPED before packaging so it is never redistributed in a release.
on:
  push:
    branches: [main]        # -> rolling "nightly" prerelease
    tags: ['v*']            # -> versioned release, marked latest
  workflow_dispatch:

concurrency: { group: ci-main, cancel-in-progress: false }   # tests are stateful; never overlap
permissions: { contents: write }                             # publish releases + move nightly tag

jobs:
  build-test-publish:
    runs-on: windows-latest
    timeout-minutes: 120
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: microsoft/setup-msbuild@v2

      - name: Compute version + channel, stamp src/version.h
        id: meta
        shell: pwsh
        run: |
          $vh = "src\version.h"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            # ---- official release: version = the tag ----
            $v = $env:GITHUB_REF_NAME.TrimStart('v')            # 8.4.3
            $gitSuffix = " (v$v)"
            "channel=release"          >> $env:GITHUB_OUTPUT
            "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "name=$env:GITHUB_REF_NAME">> $env:GITHUB_OUTPUT
            "prerelease=false"         >> $env:GITHUB_OUTPUT
            "latest=true"              >> $env:GITHUB_OUTPUT
          } else {
            # ---- rolling nightly: patch = last-tag patch + commits since tag ----
            $desc = (git describe --tags --long --match "v*" 2>$null)
            if ($desc -match '^v(\d+)\.(\d+)\.(\d+)-(\d+)-g') {
              $v = "$($Matches[1]).$($Matches[2]).$([int]$Matches[3] + [int]$Matches[4])"
            } else {
              # no release tag yet: base from version.h + total commit count
              $m = [regex]::Match((Get-Content $vh -Raw), 'OPENXCOM_VERSION_LONG "(\d+)\.(\d+)\.(\d+)')
              $n = [int](git rev-list --count HEAD)
              $v = "$($m.Groups[1].Value).$($m.Groups[2].Value).$([int]$m.Groups[3].Value + $n)"
            }
            $sha  = (git rev-parse --short HEAD)
            $date = (git show -s --format=%cd --date=format:'%Y-%m-%d')
            $gitSuffix = " (nightly $date $sha)"
            "channel=nightly"                 >> $env:GITHUB_OUTPUT
            "tag=nightly"                     >> $env:GITHUB_OUTPUT
            "name=Nightly $v ($sha)"          >> $env:GITHUB_OUTPUT
            "prerelease=true"                 >> $env:GITHUB_OUTPUT
            "latest=false"                    >> $env:GITHUB_OUTPUT
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          $p = $v.Split('.')
          # rewrite version.h at build time (not committed)
          $c = Get-Content $vh -Raw
          $c = $c -replace 'OPENXCOM_VERSION_SHORT "[^"]*"',   "OPENXCOM_VERSION_SHORT `"Extended $v`""
          $c = $c -replace 'OPENXCOM_VERSION_LONG "[^"]*"',    "OPENXCOM_VERSION_LONG `"$v.0`""
          $c = $c -replace 'OPENXCOM_VERSION_NUMBER [0-9, ]+', "OPENXCOM_VERSION_NUMBER $($p[0]),$($p[1]),$($p[2]),0"
          $c = $c -replace 'OPENXCOM_VERSION_GIT "[^"]*"',     "OPENXCOM_VERSION_GIT `"$gitSuffix`""
          Set-Content $vh $c -Encoding ascii
          Write-Host "Stamped version: $v$gitSuffix"

      - name: Build x64 Release (serial)
        timeout-minutes: 60
        # Serial: /m can OOM the template-heavy TUs (C1060). Unique _MSPDBSRV_ENDPOINT_
        # avoids the per-user mspdbsrv PDB-server collision (C1090 / D8040) if a runner
        # is ever shared with another build.
        env:
          _MSPDBSRV_ENDPOINT_: ci_${{ github.run_id }}_${{ github.run_attempt }}
        shell: cmd
        working-directory: src
        run: msbuild OpenXcom.2010.sln /v:minimal /p:Configuration=Release /p:Platform=x64

      - name: Fetch UFO data (private, licensed)
        uses: actions/checkout@v4
        with:
          repository: OpenXcom-Coop/UFO_Data
          ssh-key: ${{ secrets.UFO_DATA_DEPLOY_KEY }}
          path: .ufo_data

      - name: Stage data next to exe
        shell: pwsh
        run: |
          $d = "bin\x64\Release"
          robocopy deps\lib\x64 $d *.dll /NFL /NDL /NJH /NJS
          robocopy bin\standard "$d\standard" /E /NFL /NDL /NJH /NJS
          robocopy bin\common   "$d\common"   /E /NFL /NDL /NJH /NJS
          robocopy .ufo_data "$d\UFO" /E /XD .git /NFL /NDL /NJH /NJS               # licensed UFO data from private repo
          robocopy bin\UFO\multiplayer "$d\UFO\multiplayer" /E /NFL /NDL /NJH /NJS   # coop art, from the public repo
          if ($LASTEXITCODE -lt 8) { $global:LASTEXITCODE = 0 }
          # Rendezvous config (git-ignored real one is per-deployment): the coop
          # harness needs a parseable rendezvous.json next to the exe or ServerList's
          # ctor errors into a CoopState (lobby tests) and the UDP-public host path
          # crashes. Ship the CI config (blackhole host + throwaway valid keys).
          Copy-Item tools\coop_test\rendezvous.ci.json "$d\rendezvous.json" -Force
          if (-not (Test-Path "$d\OpenXcom.exe"))          { throw "build produced no exe" }
          if (-not (Test-Path "$d\UFO\GEODATA"))           { throw "UFO data not staged" }
          if (-not (Test-Path "$d\UFO\multiplayer\base.png")) { throw "coop assets not staged" }
          if (-not (Test-Path "$d\rendezvous.json"))       { throw "rendezvous.json not staged" }

      - name: Coop test suite (headless)   # release gate
        timeout-minutes: 40
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          # Discover main's actual harness so the suite never goes stale.
          $tests = Get-ChildItem tools\coop_test\boot_check.py, tools\coop_test\test_*.py |
                   Select-Object -ExpandProperty BaseName | Sort-Object
          # Known-broken on main (real failures, not flakes) - run but do not gate.
          # Add entries here if a test regresses; remove them as they are fixed so
          # they gate again. Empty = the whole suite gates (all green as of 2026-07-15).
          $quarantine = @()
          $fail = 0
          foreach ($t in $tests) {
            python "tools\coop_test\$t.py"; $rc = $LASTEXITCODE
            if ($rc -ne 0) { python "tools\coop_test\$t.py"; $rc = $LASTEXITCODE }   # retry once (flake tolerance)
            if ($rc -eq 0)                  { Write-Host "PASS        $t" }
            elseif ($quarantine -contains $t) { Write-Host "KNOWN-FAIL  $t (quarantined, rc=$rc)" }
            else                            { Write-Host "FAIL        $t (rc=$rc)"; $fail++ }
          }
          if ($fail -gt 0) { throw "$fail non-quarantined test(s) failed" }

      - name: Write release rendezvous.json (real Official server, from secret)
        if: success()
        shell: pwsh
        env:
          RELEASE_RENDEZVOUS_JSON: ${{ secrets.RELEASE_RENDEZVOUS_JSON }}
        run: |
          # The test stage above ran against the blackhole tools/coop_test/rendezvous.ci.json.
          # For the shipped zip, replace it with the real config from the repo secret so
          # end users get a working "Official" server. Fail loudly if the secret is unset
          # so a broken/placeholder config never ships.
          $d = "bin\x64\Release"
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_RENDEZVOUS_JSON)) {
            throw "RELEASE_RENDEZVOUS_JSON secret is empty/unset - set it (repo Settings > Secrets and variables > Actions) before publishing a release."
          }
          try { $null = $env:RELEASE_RENDEZVOUS_JSON | ConvertFrom-Json } catch { throw "RELEASE_RENDEZVOUS_JSON is not valid JSON: $_" }
          Set-Content "$d\rendezvous.json" $env:RELEASE_RENDEZVOUS_JSON -Encoding ascii -NoNewline
          Write-Host "release rendezvous.json written ($((Get-Item "$d\rendezvous.json").Length) bytes)"

      - name: Strip licensed UFO data before packaging
        if: success()
        shell: pwsh
        run: |
          # Belt-and-suspenders: the Package allowlist below already excludes UFO, but
          # delete the licensed retail data outright so it can never end up in a release,
          # even if the packaging list is later changed to a wildcard.
          Remove-Item -Recurse -Force bin\x64\Release\UFO -ErrorAction SilentlyContinue
          if (Test-Path bin\x64\Release\UFO) { throw "UFO data still present after strip" }

      - name: Package
        if: success()
        shell: pwsh
        run: |
          $v = "${{ steps.meta.outputs.version }}"
          $z = "openxcom-coop-$v-x64.zip"
          "ZIP=$z" >> $env:GITHUB_ENV
          Compress-Archive bin\x64\Release\OpenXcom.exe,bin\x64\Release\*.dll,bin\x64\Release\rendezvous.json,bin\common,bin\standard,LICENSE.txt -DestinationPath $z -Force
          # Guard: assert no licensed retail X-COM data (GEODATA is the canary) is in the zip.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $z).Path)
          $bad = @($zip.Entries.FullName | Where-Object { $_ -match 'GEODATA' })
          $zip.Dispose()
          if ($bad.Count) { throw "licensed retail data leaked into release zip: $($bad -join ', ')" }
          Write-Host "package OK ($z); no licensed retail data included"

      - name: Release notes from CHANGELOG (release only)
        if: success() && steps.meta.outputs.channel == 'release'
        shell: pwsh
        run: |
          $v = "${{ steps.meta.outputs.version }}"
          $out = "release-notes.md"
          if (-not (Test-Path "CHANGELOG.md")) { throw "CHANGELOG.md missing - add a '## [$v]' section before tagging" }
          # extract the "## [<v>]" section up to the next "## " heading
          $lines = Get-Content CHANGELOG.md
          $start = ($lines | Select-String -Pattern ("^##\s*\[?" + [regex]::Escape($v) + "\]?") | Select-Object -First 1).LineNumber
          if (-not $start) { throw "CHANGELOG.md has no section for $v (expected '## [$v]')" }
          $body = @()
          for ($i = $start; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^##\s') { break }
            $body += $lines[$i]
          }
          Set-Content $out ($body -join "`n").Trim() -Encoding utf8
          Write-Host "Release notes for $v:"; Get-Content $out

      - name: Move rolling nightly tag
        if: success() && steps.meta.outputs.channel == 'nightly'
        shell: pwsh
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Publish
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ steps.meta.outputs.tag }}
          name:        ${{ steps.meta.outputs.name }}
          prerelease:  ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.latest }}
          files: ${{ env.ZIP }}
          # release -> curated notes from CHANGELOG.md; nightly -> auto-generated
          body_path: ${{ steps.meta.outputs.channel == 'release' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.meta.outputs.channel != 'release' }}

  # 32-bit static WinXP binary, MinGW cross-compiled on Linux via MXE. Runs after
  # the x64 job publishes the release, then attaches its zip as an extra asset.
  # (Folded in from the old build-mxe.yml/build-winxp.yml - one unified CI.)
  build-winxp:
    needs: [build-test-publish]
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build tools + MXE deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git make g++ build-essential \
            autopoint gperf intltool libtool-bin lzip zip \
            ca-certificates wget xz-utils bzip2 \
            file patch perl pkg-config curl \
            python2-minimal \
            p7zip-full bison flex ruby \
            gdk-pixbuf2.0-bin \
            libssl-dev libcurl4-openssl-dev zlib1g-dev libexpat1-dev libncurses5-dev
          ln -sf /usr/bin/python2.7 /usr/bin/python  || true
          ln -sf /usr/bin/python2.7 /usr/bin/python2 || true

      - uses: actions/checkout@v4
        with: { fetch-depth: 0, submodules: recursive }

      - name: Cache MXE toolchain
        id: cache-mxe
        uses: actions/cache@v4
        with:
          path: mxe
          key: Linux-mxe-v7e39b555dee5e906b24a44940055dc28d4056d23-gcc11-jsoncpp-sdl_net-libsodium-v8

      - name: Build MXE toolchain (only on cache miss)
        if: steps.cache-mxe.outputs.cache-hit != 'true'
        run: |
          if [ ! -d mxe ]; then git clone https://github.com/mxe/mxe.git mxe; fi
          cd mxe
          git checkout 7e39b555dee5e906b24a44940055dc28d4056d23
          # keep mingw-w64 VERSION + CHECKSUM in sync
          sed -i 's/$(PKG)_VERSION := 8\.0\.2/$(PKG)_VERSION := 8.0.3/' src/mingw-w64.mk
          sed -i 's/$(PKG)_CHECKSUM := f00cf1e2f975008855c93b9e0f8ec97decbf50f478e7ae4c7b5ffb9cdc54b743/$(PKG)_CHECKSUM := d702ef712c8f22035f81ddf6089542adf6bcb6ea669d4ebf4e311f87242882f0/' src/mingw-w64.mk
          export MXE_PLUGIN_DIRS="$PWD/plugins/gcc11"
          make MXE_TARGETS=i686-w64-mingw32.static JOBS=$(nproc) \
            gcc cmake \
            sdl sdl_net sdl_gfx sdl_mixer sdl_image \
            yaml-cpp jsoncpp libsodium

      - name: Configure + build (WinXP i686 static)
        run: |
          set -euxo pipefail
          export PATH="$GITHUB_WORKSPACE/mxe/usr/bin:$PATH"
          export MXE_PREFIX="$GITHUB_WORKSPACE/mxe/usr/i686-w64-mingw32.static"
          export PKG_CONFIG_PATH="$MXE_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="$MXE_PREFIX/lib/pkgconfig"
          rm -rf build && mkdir -p build && cd build
          i686-w64-mingw32.static-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEV_BUILD=OFF \
            -DBUILD_PACKAGE=OFF \
            -DCMAKE_PREFIX_PATH="$MXE_PREFIX" \
            -DDEPS_DIR= \
            "$GITHUB_WORKSPACE"
          make -j"$(nproc)"

      - name: Package WinXP zip
        run: |
          cd build/bin
          rm -f libopenxcom.dll.a || true
          zip -r "$GITHUB_WORKSPACE/openxcom-coop-winxp-${{ needs.build-test-publish.outputs.version }}-i686.zip" .

      - name: Attach WinXP zip to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-test-publish.outputs.tag }}
          files: openxcom-coop-winxp-${{ needs.build-test-publish.outputs.version }}-i686.zip
