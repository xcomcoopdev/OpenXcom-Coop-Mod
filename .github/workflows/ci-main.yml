name: CI (build + coop tests + publish)

# FREE GitHub-hosted runners. Builds x64 Release from a clean checkout, runs the
# coop harness headless, and publishes a rolling nightly (push to main) or a
# versioned release (push of a v* tag), then attaches WinXP i686 and Linux x86_64
# builds to the same release. Licensed UFO game data is pulled from the private
# OpenXcom-Coop/UFO_Data repo via a read-only deploy key (UFO_DATA_DEPLOY_KEY)
# and only ever exists in the test job, so it can never leak into a release.
#
# Job graph:
#
#   meta ─┬─ build ── coop-tests ─┐
#         ├─ build-winxp ─────────┼─ publish   (all three packages, one release)
#         └─ build-linux ─────────┘
#
# Split into separate jobs so a flaky test can be re-run ("Re-run failed jobs")
# without repeating the ~13m build, and so per-stage durations show in the run
# summary graph. `meta` exists so the two cross-builds - which share no artifact
# with the x64 build - can start immediately instead of waiting on it for the
# version string; they upload their packages and `publish` attaches all three at
# once, so a release is never briefly live missing a platform.
on:
  push:
    branches: [main]        # -> rolling "nightly" prerelease
    tags: ['v*']            # -> versioned release, marked latest
  workflow_dispatch:

concurrency: { group: ci-main, cancel-in-progress: false }   # publishes are ordered; never overlap
permissions: { contents: read }                              # write only in the publishing jobs

jobs:
  # Version/channel for the whole run, computed once so every build job can start
  # immediately. It used to live inside `build`, and since job outputs only exist
  # once the job finishes, the WinXP and Linux builds could not start until the
  # ~13-minute x64 build had finished - even though they share no artifact with it.
  meta:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version:    ${{ steps.meta.outputs.version }}
      gitSuffix:  ${{ steps.meta.outputs.gitSuffix }}
      channel:    ${{ steps.meta.outputs.channel }}
      tag:        ${{ steps.meta.outputs.tag }}
      name:       ${{ steps.meta.outputs.name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      latest:     ${{ steps.meta.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }    # full history: version = git describe

      - name: Compute version + channel
        id: meta
        shell: pwsh
        run: |
          $vh = "src/version.h"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            # ---- official release: version = the tag ----
            $v = $env:GITHUB_REF_NAME.TrimStart('v')            # 8.4.3
            $gitSuffix = " (v$v)"
            "channel=release"          >> $env:GITHUB_OUTPUT
            "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "name=$env:GITHUB_REF_NAME">> $env:GITHUB_OUTPUT
            "prerelease=false"         >> $env:GITHUB_OUTPUT
            "latest=true"              >> $env:GITHUB_OUTPUT
          } else {
            # ---- rolling nightly: patch = last-tag patch + commits since tag ----
            $desc = (git describe --tags --long --match "v*" 2>$null)
            if ($desc -match '^v(\d+)\.(\d+)\.(\d+)-(\d+)-g') {
              $v = "$($Matches[1]).$($Matches[2]).$([int]$Matches[3] + [int]$Matches[4])"
            } else {
              # no release tag yet: base from version.h + total commit count
              $m = [regex]::Match((Get-Content $vh -Raw), 'OPENXCOM_VERSION_LONG "(\d+)\.(\d+)\.(\d+)')
              $n = [int](git rev-list --count HEAD)
              $v = "$($m.Groups[1].Value).$($m.Groups[2].Value).$([int]$m.Groups[3].Value + $n)"
            }
            $sha  = (git rev-parse --short HEAD)
            $date = (git show -s --format=%cd --date=format:'%Y-%m-%d')
            $gitSuffix = " (nightly $date $sha)"
            "channel=nightly"                 >> $env:GITHUB_OUTPUT
            "tag=nightly"                     >> $env:GITHUB_OUTPUT
            "name=Nightly $v ($sha)"          >> $env:GITHUB_OUTPUT
            "prerelease=true"                 >> $env:GITHUB_OUTPUT
            "latest=false"                    >> $env:GITHUB_OUTPUT
          }
          "version=$v"             >> $env:GITHUB_OUTPUT
          "gitSuffix=$gitSuffix"   >> $env:GITHUB_OUTPUT
          Write-Host "version: $v$gitSuffix"

  build:
    needs: meta
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Stamp src/version.h
        shell: bash
        run: sh tools/ci/stamp_version.sh "${{ needs.meta.outputs.version }}" "${{ needs.meta.outputs.gitSuffix }}"

      - name: Build x64 Release (serial)
        timeout-minutes: 60
        # Serial: /m can OOM the template-heavy TUs (C1060). Unique _MSPDBSRV_ENDPOINT_
        # avoids the per-user mspdbsrv PDB-server collision (C1090 / D8040) if a runner
        # is ever shared with another build.
        env:
          _MSPDBSRV_ENDPOINT_: ci_${{ github.run_id }}_${{ github.run_attempt }}
        shell: cmd
        working-directory: src
        run: msbuild OpenXcom.2010.sln /v:minimal /p:Configuration=Release /p:Platform=x64

      - uses: actions/upload-artifact@v4
        with:
          name: game-exe
          path: bin/x64/Release/OpenXcom.exe
          if-no-files-found: error
          retention-days: 7

  # Splits the suite into 4 runtime-balanced shards, ONCE, from the previous run's
  # measured durations (Actions cache; tools/ci/test_weights.json on a cold cache).
  # Every shard consumes this one plan, so a cache refresh mid-run cannot make two
  # shards disagree about who runs what.
  shard-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache/restore@v4
        with:
          path: .ci_timings
          key: coop-timings-${{ github.run_id }}       # never hits; restore-keys does the work
          restore-keys: coop-timings-                  # newest cache from this branch, else main

      - shell: pwsh
        run: ./tools/ci/plan_shards.ps1 -Of 4 -Timings .ci_timings/timings.json -Out shard-plan.json

      - uses: actions/upload-artifact@v4
        with: { name: shard-plan, path: shard-plan.json, if-no-files-found: error, retention-days: 7 }

  coop-shard:
    needs: [build, shard-plan]
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false          # one shard's failure must not hide the others' results
      matrix: { shard: [1, 2, 3, 4] }
    steps:
      - uses: actions/checkout@v4    # shallow: only needs bin data + tools/, not history

      - uses: actions/download-artifact@v4
        with:
          name: game-exe
          path: bin/x64/Release

      - uses: actions/download-artifact@v4
        with: { name: shard-plan }

      - name: Fetch UFO data (private, licensed)
        uses: actions/checkout@v4
        with:
          repository: OpenXcom-Coop/UFO_Data
          ssh-key: ${{ secrets.UFO_DATA_DEPLOY_KEY }}
          path: .ufo_data
          persist-credentials: false

      - name: Stage data next to exe
        shell: pwsh
        run: ./tools/ci/stage_data.ps1

      - name: Coop test suite (headless, shard ${{ matrix.shard }}/4)
        timeout-minutes: 25
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: >-
          ./tools/ci/run_coop_suite.ps1 -PlanFile shard-plan.json
          -Shard ${{ matrix.shard }} -TimingsOut timings-${{ matrix.shard }}.json

      - uses: actions/upload-artifact@v4
        if: always()               # a failed shard still measured everything before it
        with:
          name: timings-${{ matrix.shard }}
          path: timings-${{ matrix.shard }}.json
          if-no-files-found: ignore
          retention-days: 7

  # Release gate + aggregation. Keeps the name `coop-tests` because main's branch
  # protection requires that check by name - a matrix job would publish as
  # "coop-shard (1)" and the required check would never report.
  coop-tests:
    needs: coop-shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # A matrix job's aggregate result is 'success' only when every leg passed.
      # 'skipped' means an upstream job failed - that already blocks publish, and
      # failing here too would just add noise.
      - name: Gate on every shard
        if: needs.coop-shard.result == 'failure' || needs.coop-shard.result == 'cancelled'
        run: |
          echo "::error::coop-shard: ${{ needs.coop-shard.result }}"
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { pattern: timings-*, path: .ci_new, merge-multiple: false }
        continue-on-error: true

      - uses: actions/cache/restore@v4
        with:
          path: .ci_timings
          key: coop-timings-${{ github.run_id }}
          restore-keys: coop-timings-
        continue-on-error: true

      - name: Merge shard timings for the next run's plan
        shell: pwsh
        continue-on-error: true    # balance is an optimization; never fail the gate on it
        run: |
          New-Item -ItemType Directory -Force .ci_timings | Out-Null
          ./tools/ci/merge_timings.ps1 -In .ci_new -Prev .ci_timings/timings.json -Out .ci_timings/timings.json

      - uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ci_timings
          key: coop-timings-${{ github.run_id }}

  # The ONLY job that writes to the release, and it does it once with all three
  # packages attached. It used to create the release with just the x64 zip and let
  # build-winxp/build-linux append theirs afterwards, which left the nightly briefly
  # live with a missing platform and serialized two builds that share nothing with
  # the x64 one behind the whole build -> coop-tests chain.
  publish:
    needs: [meta, build, coop-tests, build-winxp, build-linux]
    runs-on: windows-latest
    timeout-minutes: 20
    permissions: { contents: write }   # publish releases + move nightly tag
    steps:
      - uses: actions/checkout@v4      # shallow: bin data, LICENSE, CHANGELOG, tag push

      - uses: actions/download-artifact@v4
        with:
          name: game-exe
          path: bin/x64/Release

      - name: Download the WinXP + Linux packages
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: .pkgs
          merge-multiple: true

      - name: Stage packaging inputs (no UFO data in this job)
        shell: pwsh
        run: |
          robocopy deps\lib\x64 bin\x64\Release *.dll /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -lt 8) { $global:LASTEXITCODE = 0 }
          if (-not (Test-Path "bin\x64\Release\OpenXcom.exe")) { throw "exe artifact missing" }

      - name: Write release rendezvous.json (real Official server, from secret)
        shell: pwsh
        env:
          RELEASE_RENDEZVOUS_JSON: ${{ secrets.RELEASE_RENDEZVOUS_JSON }}
        run: |
          # The test job ran against the blackhole tools/coop_test/rendezvous.ci.json.
          # For the shipped zip, write the real config from the repo secret so end
          # users get a working "Official" server. Fail loudly if the secret is unset
          # so a broken/placeholder config never ships.
          $d = "bin\x64\Release"
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_RENDEZVOUS_JSON)) {
            throw "RELEASE_RENDEZVOUS_JSON secret is empty/unset - set it (repo Settings > Secrets and variables > Actions) before publishing a release."
          }
          try { $null = $env:RELEASE_RENDEZVOUS_JSON | ConvertFrom-Json } catch { throw "RELEASE_RENDEZVOUS_JSON is not valid JSON: $_" }
          Set-Content "$d\rendezvous.json" $env:RELEASE_RENDEZVOUS_JSON -Encoding ascii -NoNewline
          Write-Host "release rendezvous.json written ($((Get-Item "$d\rendezvous.json").Length) bytes)"

      - name: Package
        shell: pwsh
        run: |
          $v = "${{ needs.meta.outputs.version }}"
          $z = "openxcom-coop-$v-x64.zip"
          "ZIP=$z" >> $env:GITHUB_ENV
          # Stage the exact tree we ship. UFO/TFTD are staged one subdirectory at a
          # time (never the whole dir): the game needs UFO\multiplayer\base.png at
          # runtime - Globe's ctor throws and kills "new game" without it - while the
          # rest of UFO/ is licensed retail data that must never be packaged.
          $p = "pkg"
          Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $p, "$p\UFO", "$p\TFTD" | Out-Null
          Copy-Item bin\x64\Release\OpenXcom.exe,bin\x64\Release\*.dll,bin\x64\Release\rendezvous.json,LICENSE.txt $p
          Copy-Item bin\common,bin\standard $p -Recurse
          Copy-Item bin\UFO\multiplayer  "$p\UFO"  -Recurse    # coop art only
          Copy-Item bin\TFTD\multiplayer "$p\TFTD" -Recurse    # coop art only
          Compress-Archive "$p\*" -DestinationPath $z -Force
          ./tools/ci/assert_package.ps1 $z
          # The WinXP zip was asserted as a staged tree in its own job; re-assert the
          # finished archive here, so what actually gets uploaded is what was checked.
          $xp = Get-ChildItem .pkgs\*winxp*.zip | Select-Object -First 1
          if (-not $xp) { throw "WinXP package artifact missing" }
          ./tools/ci/assert_package.ps1 $xp.FullName
          $tar = Get-ChildItem .pkgs\*linux*.tar.gz | Select-Object -First 1
          if (-not $tar) { throw "Linux package artifact missing" }
          # Multi-line env var: GITHUB_ENV needs the delimiter form, and
          # action-gh-release takes newline-separated paths in `files:`.
          $assets = @($z, $xp.FullName, $tar.FullName) -join "`n"
          "ASSETS<<PKGEOF`n$assets`nPKGEOF" >> $env:GITHUB_ENV
          Write-Host "publishing:`n$assets"

      - name: Release notes from CHANGELOG (release only)
        if: needs.meta.outputs.channel == 'release'
        shell: pwsh
        run: |
          $v = "${{ needs.meta.outputs.version }}"
          $out = "release-notes.md"
          if (-not (Test-Path "CHANGELOG.md")) { throw "CHANGELOG.md missing - add a '## [$v]' section before tagging" }
          # extract the "## [<v>]" section up to the next "## " heading
          $lines = Get-Content CHANGELOG.md
          $start = ($lines | Select-String -Pattern ("^##\s*\[?" + [regex]::Escape($v) + "\]?") | Select-Object -First 1).LineNumber
          if (-not $start) { throw "CHANGELOG.md has no section for $v (expected '## [$v]')" }
          $body = @()
          for ($i = $start; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^##\s') { break }
            $body += $lines[$i]
          }
          Set-Content $out ($body -join "`n").Trim() -Encoding utf8
          Write-Host "Release notes for $v:"; Get-Content $out

      - name: Move rolling nightly tag
        if: needs.meta.outputs.channel == 'nightly'
        shell: pwsh
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Reset rolling nightly release (avoid notes + asset buildup)
        if: needs.meta.outputs.channel == 'nightly'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The nightly tag/release rolls. Re-publishing to it appends release notes
          # and accumulates versioned assets (old x64/WinXP/Linux files never get
          # overwritten). Delete the previous nightly RELEASE (keep the just-moved
          # tag) so Publish recreates it fresh: correct notes + only this run's assets.
          gh release delete nightly --repo "$env:GITHUB_REPOSITORY" --yes 2>$null
          $global:LASTEXITCODE = 0
          Write-Host "Cleared previous nightly release (if any)"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.meta.outputs.tag }}
          name:        ${{ needs.meta.outputs.name }}
          prerelease:  ${{ needs.meta.outputs.prerelease }}
          make_latest: ${{ needs.meta.outputs.latest }}
          files: ${{ env.ASSETS }}      # x64 zip + WinXP zip + Linux tarball, one call
          # release -> curated notes from CHANGELOG.md; nightly -> auto-generated
          body_path: ${{ needs.meta.outputs.channel == 'release' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ needs.meta.outputs.channel != 'release' }}

      - name: Strip auto-generated 'New Contributors' from nightly notes
        if: needs.meta.outputs.channel == 'nightly'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # "New Contributors" is meaningless on a rolling tag: GitHub recomputes it each
          # run against a shifting base (the last release tag) and flags even the original
          # dev as "new". Remove that section, keeping "## What's Changed" + "Full Changelog".
          # NOTE: gh returns the body as a string[] (one element per line). Without an
          # explicit -join, PowerShell coerces it to a single string joined with SPACES,
          # which destroys every newline (notes render as one run-on paragraph) and makes
          # the regex below never match. Always -join "`n" first.
          $body  = (gh release view nightly --repo "$env:GITHUB_REPOSITORY" --json body --jq '.body') -join "`n"
          $clean = [regex]::Replace($body, "(?s)\r?\n?## New Contributors\r?\n(?:\*.*\r?\n?)*\r?\n?(?=\*\*Full Changelog\*\*)", "`n`n")
          Set-Content nightly-notes.md $clean -Encoding utf8
          if ($clean -notmatch "## What's Changed") { throw "nightly notes look wrong after strip - aborting rather than publishing mangled notes" }
          gh release edit nightly --repo "$env:GITHUB_REPOSITORY" --notes-file nightly-notes.md
          Write-Host "Stripped 'New Contributors' from nightly notes"

  # 32-bit static WinXP binary, MinGW cross-compiled on Linux via MXE. Shares no
  # artifact with the x64 build, so it starts as soon as `meta` has the version and
  # runs alongside build + coop-tests; `publish` attaches the zip it uploads here.
  # (Folded in from the old build-mxe.yml/build-winxp.yml - one unified CI.)
  build-winxp:
    needs: meta
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build tools + MXE deps
        # Retried: hosted runners share an egress to archive.ubuntu.com and
        # intermittently get "Connection failed" part-way through the fetch. That is
        # all that killed the nightly at 8.4.13215 (run 29942028942 - g++, libsasl2-2
        # and unzip each failed to download after 100+ MB had come through fine).
        # Acquire::Retries covers a single blip; the outer loop re-runs `update` too,
        # so a mirror that has since rotated its index cannot leave us pinned to a
        # version that no longer exists. This step must run BEFORE checkout (the
        # container has no git, which `submodules: recursive` needs), so the retry
        # cannot be factored out into a repo script.
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -eu
          apt_get() { apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 "$@"; }
          ok=0
          for n in 1 2 3 4; do
            if apt_get update && apt_get install -y \
                 git make g++ build-essential \
                 autopoint gperf intltool libtool-bin lzip zip \
                 ca-certificates wget xz-utils bzip2 \
                 file patch perl pkg-config curl \
                 python2-minimal \
                 p7zip-full bison flex ruby \
                 gdk-pixbuf2.0-bin \
                 libssl-dev libcurl4-openssl-dev zlib1g-dev libexpat1-dev libncurses5-dev
            then ok=1; break; fi
            echo "apt attempt $n failed (mirror flake); retrying in $((n * 15))s"
            sleep $((n * 15))
          done
          [ "$ok" = 1 ] || { echo "::error::apt-get failed after 4 attempts"; exit 1; }
          ln -sf /usr/bin/python2.7 /usr/bin/python  || true
          ln -sf /usr/bin/python2.7 /usr/bin/python2 || true

      - uses: actions/checkout@v4
        with: { fetch-depth: 0, submodules: recursive }

      - name: Cache MXE toolchain
        id: cache-mxe
        uses: actions/cache@v4
        with:
          path: mxe
          key: Linux-mxe-v7e39b555dee5e906b24a44940055dc28d4056d23-gcc11-jsoncpp-sdl_net-libsodium-v8

      - name: Build MXE toolchain (only on cache miss)
        if: steps.cache-mxe.outputs.cache-hit != 'true'
        run: |
          if [ ! -d mxe ]; then git clone https://github.com/mxe/mxe.git mxe; fi
          cd mxe
          git checkout 7e39b555dee5e906b24a44940055dc28d4056d23
          # keep mingw-w64 VERSION + CHECKSUM in sync
          sed -i 's/$(PKG)_VERSION := 8\.0\.2/$(PKG)_VERSION := 8.0.3/' src/mingw-w64.mk
          sed -i 's/$(PKG)_CHECKSUM := f00cf1e2f975008855c93b9e0f8ec97decbf50f478e7ae4c7b5ffb9cdc54b743/$(PKG)_CHECKSUM := d702ef712c8f22035f81ddf6089542adf6bcb6ea669d4ebf4e311f87242882f0/' src/mingw-w64.mk
          export MXE_PLUGIN_DIRS="$PWD/plugins/gcc11"
          make MXE_TARGETS=i686-w64-mingw32.static JOBS=$(nproc) \
            gcc cmake \
            sdl sdl_net sdl_gfx sdl_mixer sdl_image \
            yaml-cpp jsoncpp libsodium

      - name: Stamp src/version.h
        run: sh tools/ci/stamp_version.sh "${{ needs.meta.outputs.version }}" "${{ needs.meta.outputs.gitSuffix }}"

      - name: Configure + build (WinXP i686 static)
        run: |
          set -euxo pipefail
          export PATH="$GITHUB_WORKSPACE/mxe/usr/bin:$PATH"
          export MXE_PREFIX="$GITHUB_WORKSPACE/mxe/usr/i686-w64-mingw32.static"
          export PKG_CONFIG_PATH="$MXE_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="$MXE_PREFIX/lib/pkgconfig"
          rm -rf build && mkdir -p build && cd build
          i686-w64-mingw32.static-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEV_BUILD=OFF \
            -DBUILD_PACKAGE=OFF \
            -DCMAKE_PREFIX_PATH="$MXE_PREFIX" \
            -DDEPS_DIR= \
            "$GITHUB_WORKSPACE"
          make -j"$(nproc)"

      - name: Package WinXP zip
        env:
          RELEASE_RENDEZVOUS_JSON: ${{ secrets.RELEASE_RENDEZVOUS_JSON }}
        run: |
          set -euxo pipefail
          # CMake's post-build step copies bin/{UFO,TFTD,common,standard} into
          # build/bin, and this job used to just zip that - which is why it got the
          # data dirs right and the non-build-output files wrong: it shipped no
          # rendezvous.json (Official server list comes up empty, see
          # rendezvous_config.cpp) and no LICENSE.txt. Inject both, exactly like the
          # x64 and Linux packages do, then assert the tree before zipping it.
          if [ -z "$RELEASE_RENDEZVOUS_JSON" ]; then echo "RELEASE_RENDEZVOUS_JSON secret empty"; exit 1; fi
          printf '%s' "$RELEASE_RENDEZVOUS_JSON" > build/bin/rendezvous.json
          grep -q '"servers"' build/bin/rendezvous.json || { echo "rendezvous.json has no servers array"; exit 1; }
          cp LICENSE.txt build/bin/
          sh tools/ci/assert_package_dir.sh build/bin
          cd build/bin
          rm -f libopenxcom.dll.a || true
          zip -r "$GITHUB_WORKSPACE/openxcom-coop-winxp-${{ needs.meta.outputs.version }}-i686.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-winxp
          path: openxcom-coop-winxp-${{ needs.meta.outputs.version }}-i686.zip
          if-no-files-found: error
          retention-days: 7

  # Native Linux (x86_64) build via GCC. Like the WinXP job it only needs `meta`,
  # so it runs in parallel with the x64 build; `publish` attaches its tarball.
  build-linux:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Install deps
        # Same mirror-flake retry as build-winxp - see the comment there.
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -eu
          apt_get() { sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 "$@"; }
          ok=0
          for n in 1 2 3 4; do
            if apt_get update && apt_get install -y \
                 cmake g++ make \
                 libsdl1.2-dev libsdl-mixer1.2-dev libsdl-gfx1.2-dev libsdl-image1.2-dev libsdl-net1.2-dev \
                 libyaml-cpp-dev libjsoncpp-dev libsodium-dev zlib1g-dev
            then ok=1; break; fi
            echo "apt attempt $n failed (mirror flake); retrying in $((n * 15))s"
            sleep $((n * 15))
          done
          [ "$ok" = 1 ] || { echo "::error::apt-get failed after 4 attempts"; exit 1; }

      - uses: actions/checkout@v4
        with: { fetch-depth: 0, submodules: recursive }

      - name: Stamp src/version.h
        run: sh tools/ci/stamp_version.sh "${{ needs.meta.outputs.version }}" "${{ needs.meta.outputs.gitSuffix }}"

      - name: Configure + build (Linux x86_64)
        run: |
          set -euxo pipefail
          # ubuntu's libjsoncpp-dev installs headers under /usr/include/jsoncpp;
          # the code includes <json/json.h>, so add jsoncpp's include dir.
          JSONCPP_CFLAGS=$(pkg-config --cflags jsoncpp)
          rm -rf build && mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DDEV_BUILD=OFF -DBUILD_PACKAGE=OFF \
            -DCMAKE_CXX_FLAGS="$JSONCPP_CFLAGS" "$GITHUB_WORKSPACE"
          make -j"$(nproc)"

      - name: Package Linux tarball
        env:
          RELEASE_RENDEZVOUS_JSON: ${{ secrets.RELEASE_RENDEZVOUS_JSON }}
        run: |
          set -euxo pipefail
          v="${{ needs.meta.outputs.version }}"
          pkg="openxcom-coop-linux-$v-x86_64"
          mkdir -p "$pkg/UFO" "$pkg/TFTD"
          cp build/bin/openxcom "$pkg/"
          cp -r bin/common bin/standard "$pkg/"
          # coop art only - never the whole UFO/TFTD dir (licensed retail data).
          # Globe's ctor throws on a missing multiplayer/base.png, killing "new game".
          cp -r bin/UFO/multiplayer  "$pkg/UFO/"
          cp -r bin/TFTD/multiplayer "$pkg/TFTD/"
          cp LICENSE.txt "$pkg/"      # required by assert_package_dir.sh; fail loudly if it moves
          # real rendezvous.json from the secret (same as the x64 release); UFO data is NOT included (licensed)
          if [ -z "$RELEASE_RENDEZVOUS_JSON" ]; then echo "RELEASE_RENDEZVOUS_JSON secret empty"; exit 1; fi
          printf '%s' "$RELEASE_RENDEZVOUS_JSON" > "$pkg/rendezvous.json"
          python3 -c "import json; json.load(open('$pkg/rendezvous.json'))" || { echo "rendezvous.json not valid JSON"; exit 1; }
          sh tools/ci/assert_package_dir.sh "$pkg"
          tar czf "$pkg.tar.gz" "$pkg"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-linux
          path: openxcom-coop-linux-${{ needs.meta.outputs.version }}-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 7
