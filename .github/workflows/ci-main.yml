name: CI (build + coop tests + publish)

# FREE GitHub-hosted windows-latest. Builds x64 Release from a clean checkout,
# runs the coop harness headless, and publishes a rolling nightly (push to main)
# or a versioned release (push of a v* tag). Licensed UFO game data is pulled from the
# private OpenXcom-Coop/UFO_Data repo via a read-only deploy key (UFO_DATA_DEPLOY_KEY)
# and only ever exists in the test job, so it can never leak into a release.
#
# Split into build -> coop-tests -> publish jobs so a flaky test can be re-run
# ("Re-run failed jobs") without repeating the ~1h build, and so per-stage
# durations show in the run summary graph.
on:
  push:
    branches: [main]        # -> rolling "nightly" prerelease
    tags: ['v*']            # -> versioned release, marked latest
  workflow_dispatch:

concurrency: { group: ci-main, cancel-in-progress: false }   # publishes are ordered; never overlap
permissions: { contents: read }                              # write only in the publish job

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 75
    outputs:
      version:    ${{ steps.meta.outputs.version }}
      channel:    ${{ steps.meta.outputs.channel }}
      tag:        ${{ steps.meta.outputs.tag }}
      name:       ${{ steps.meta.outputs.name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      latest:     ${{ steps.meta.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }    # full history: version = git describe

      - uses: microsoft/setup-msbuild@v2

      - name: Compute version + channel, stamp src/version.h
        id: meta
        shell: pwsh
        run: |
          $vh = "src\version.h"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            # ---- official release: version = the tag ----
            $v = $env:GITHUB_REF_NAME.TrimStart('v')            # 8.4.3
            $gitSuffix = " (v$v)"
            "channel=release"          >> $env:GITHUB_OUTPUT
            "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "name=$env:GITHUB_REF_NAME">> $env:GITHUB_OUTPUT
            "prerelease=false"         >> $env:GITHUB_OUTPUT
            "latest=true"              >> $env:GITHUB_OUTPUT
          } else {
            # ---- rolling nightly: patch = last-tag patch + commits since tag ----
            $desc = (git describe --tags --long --match "v*" 2>$null)
            if ($desc -match '^v(\d+)\.(\d+)\.(\d+)-(\d+)-g') {
              $v = "$($Matches[1]).$($Matches[2]).$([int]$Matches[3] + [int]$Matches[4])"
            } else {
              # no release tag yet: base from version.h + total commit count
              $m = [regex]::Match((Get-Content $vh -Raw), 'OPENXCOM_VERSION_LONG "(\d+)\.(\d+)\.(\d+)')
              $n = [int](git rev-list --count HEAD)
              $v = "$($m.Groups[1].Value).$($m.Groups[2].Value).$([int]$m.Groups[3].Value + $n)"
            }
            $sha  = (git rev-parse --short HEAD)
            $date = (git show -s --format=%cd --date=format:'%Y-%m-%d')
            $gitSuffix = " (nightly $date $sha)"
            "channel=nightly"                 >> $env:GITHUB_OUTPUT
            "tag=nightly"                     >> $env:GITHUB_OUTPUT
            "name=Nightly $v ($sha)"          >> $env:GITHUB_OUTPUT
            "prerelease=true"                 >> $env:GITHUB_OUTPUT
            "latest=false"                    >> $env:GITHUB_OUTPUT
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          $p = $v.Split('.')
          # rewrite version.h at build time (not committed)
          $c = Get-Content $vh -Raw
          $c = $c -replace 'OPENXCOM_VERSION_SHORT "[^"]*"',   "OPENXCOM_VERSION_SHORT `"Extended $v`""
          $c = $c -replace 'OPENXCOM_VERSION_LONG "[^"]*"',    "OPENXCOM_VERSION_LONG `"$v.0`""
          $c = $c -replace 'OPENXCOM_VERSION_NUMBER [0-9, ]+', "OPENXCOM_VERSION_NUMBER $($p[0]),$($p[1]),$($p[2]),0"
          $c = $c -replace 'OPENXCOM_VERSION_GIT "[^"]*"',     "OPENXCOM_VERSION_GIT `"$gitSuffix`""
          Set-Content $vh $c -Encoding ascii
          Write-Host "Stamped version: $v$gitSuffix"

      - name: Build x64 Release (serial)
        timeout-minutes: 60
        # Serial: /m can OOM the template-heavy TUs (C1060). Unique _MSPDBSRV_ENDPOINT_
        # avoids the per-user mspdbsrv PDB-server collision (C1090 / D8040) if a runner
        # is ever shared with another build.
        env:
          _MSPDBSRV_ENDPOINT_: ci_${{ github.run_id }}_${{ github.run_attempt }}
        shell: cmd
        working-directory: src
        run: msbuild OpenXcom.2010.sln /v:minimal /p:Configuration=Release /p:Platform=x64

      - uses: actions/upload-artifact@v4
        with:
          name: game-exe
          path: bin/x64/Release/OpenXcom.exe
          if-no-files-found: error
          retention-days: 7

  coop-tests:   # release gate
    needs: build
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4    # shallow: only needs bin data + tools/, not history

      - uses: actions/download-artifact@v4
        with:
          name: game-exe
          path: bin/x64/Release

      - name: Fetch UFO data (private, licensed)
        uses: actions/checkout@v4
        with:
          repository: OpenXcom-Coop/UFO_Data
          ssh-key: ${{ secrets.UFO_DATA_DEPLOY_KEY }}
          path: .ufo_data
          persist-credentials: false

      - name: Stage data next to exe
        shell: pwsh
        run: ./tools/ci/stage_data.ps1

      - name: Coop test suite (headless)
        timeout-minutes: 40
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: ./tools/ci/run_coop_suite.ps1

  publish:
    needs: [build, coop-tests]
    runs-on: windows-latest
    timeout-minutes: 20
    permissions: { contents: write }   # publish releases + move nightly tag
    steps:
      - uses: actions/checkout@v4      # shallow: bin data, LICENSE, CHANGELOG, tag push

      - uses: actions/download-artifact@v4
        with:
          name: game-exe
          path: bin/x64/Release

      - name: Stage packaging inputs (no UFO data in this job)
        shell: pwsh
        run: |
          robocopy deps\lib\x64 bin\x64\Release *.dll /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -lt 8) { $global:LASTEXITCODE = 0 }
          if (-not (Test-Path "bin\x64\Release\OpenXcom.exe")) { throw "exe artifact missing" }

      - name: Write release rendezvous.json (real Official server, from secret)
        shell: pwsh
        env:
          RELEASE_RENDEZVOUS_JSON: ${{ secrets.RELEASE_RENDEZVOUS_JSON }}
        run: |
          # The test job ran against the blackhole tools/coop_test/rendezvous.ci.json.
          # For the shipped zip, write the real config from the repo secret so end
          # users get a working "Official" server. Fail loudly if the secret is unset
          # so a broken/placeholder config never ships.
          $d = "bin\x64\Release"
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_RENDEZVOUS_JSON)) {
            throw "RELEASE_RENDEZVOUS_JSON secret is empty/unset - set it (repo Settings > Secrets and variables > Actions) before publishing a release."
          }
          try { $null = $env:RELEASE_RENDEZVOUS_JSON | ConvertFrom-Json } catch { throw "RELEASE_RENDEZVOUS_JSON is not valid JSON: $_" }
          Set-Content "$d\rendezvous.json" $env:RELEASE_RENDEZVOUS_JSON -Encoding ascii -NoNewline
          Write-Host "release rendezvous.json written ($((Get-Item "$d\rendezvous.json").Length) bytes)"

      - name: Package
        shell: pwsh
        run: |
          $v = "${{ needs.build.outputs.version }}"
          $z = "openxcom-coop-$v-x64.zip"
          "ZIP=$z" >> $env:GITHUB_ENV
          Compress-Archive bin\x64\Release\OpenXcom.exe,bin\x64\Release\*.dll,bin\x64\Release\rendezvous.json,bin\common,bin\standard,LICENSE.txt -DestinationPath $z -Force
          # Guard: assert no licensed retail X-COM data (GEODATA is the canary) is in the
          # zip. This job never stages UFO data at all, but keep the canary in case the
          # packaging list is ever changed to a wildcard.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $z).Path)
          $bad = @($zip.Entries.FullName | Where-Object { $_ -match 'GEODATA' })
          $zip.Dispose()
          if ($bad.Count) { throw "licensed retail data leaked into release zip: $($bad -join ', ')" }
          Write-Host "package OK ($z); no licensed retail data included"

      - name: Release notes from CHANGELOG (release only)
        if: needs.build.outputs.channel == 'release'
        shell: pwsh
        run: |
          $v = "${{ needs.build.outputs.version }}"
          $out = "release-notes.md"
          if (-not (Test-Path "CHANGELOG.md")) { throw "CHANGELOG.md missing - add a '## [$v]' section before tagging" }
          # extract the "## [<v>]" section up to the next "## " heading
          $lines = Get-Content CHANGELOG.md
          $start = ($lines | Select-String -Pattern ("^##\s*\[?" + [regex]::Escape($v) + "\]?") | Select-Object -First 1).LineNumber
          if (-not $start) { throw "CHANGELOG.md has no section for $v (expected '## [$v]')" }
          $body = @()
          for ($i = $start; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^##\s') { break }
            $body += $lines[$i]
          }
          Set-Content $out ($body -join "`n").Trim() -Encoding utf8
          Write-Host "Release notes for $v:"; Get-Content $out

      - name: Move rolling nightly tag
        if: needs.build.outputs.channel == 'nightly'
        shell: pwsh
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.build.outputs.tag }}
          name:        ${{ needs.build.outputs.name }}
          prerelease:  ${{ needs.build.outputs.prerelease }}
          make_latest: ${{ needs.build.outputs.latest }}
          files: ${{ env.ZIP }}
          # release -> curated notes from CHANGELOG.md; nightly -> auto-generated
          body_path: ${{ needs.build.outputs.channel == 'release' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ needs.build.outputs.channel != 'release' }}
