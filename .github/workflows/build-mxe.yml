name: Build mxe

on:
  workflow_call:
    inputs:
      MXE_VERSION:
        required: true
        type: string
      GCC_VERSION:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:20.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Cache MXE
        id: cache-mxe
        uses: actions/cache@v4
        with:
          path: mxe
          key: ${{ runner.os }}-mxe-v${{ inputs.MXE_VERSION }}-gcc${{ inputs.GCC_VERSION }}-jsoncpp-sdl_net-v7

      - name: Install MXE dependencies (only if no cache)
        if: steps.cache-mxe.outputs.cache-hit != 'true'
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git make g++ build-essential \
            autopoint gperf intltool libtool-bin lzip zip \
            ca-certificates wget xz-utils bzip2 \
            file patch perl pkg-config curl \
            python2-minimal \
            p7zip-full bison flex ruby \
            gdk-pixbuf2.0-bin \
            libssl-dev libcurl4-openssl-dev zlib1g-dev libexpat1-dev libncurses5-dev

          # Ensure /usr/bin/python exists and points to Python 2
          ln -sf /usr/bin/python2.7 /usr/bin/python || true
          ln -sf /usr/bin/python2.7 /usr/bin/python2 || true

      - name: Set up MXE environment (Windows XP support)
        if: steps.cache-mxe.outputs.cache-hit != 'true'
        run: |
          if [ ! -d mxe ]; then
            git clone https://github.com/mxe/mxe.git mxe
          fi

          cd mxe
          git checkout ${{ inputs.MXE_VERSION }}

          # Force mingw-w64 VERSION + CHECKSUM to stay in sync
          if [ "${{ inputs.MXE_VERSION }}" = "7e39b555dee5e906b24a44940055dc28d4056d23" ]; then
            sed -i 's/$(PKG)_VERSION := 8\.0\.2/$(PKG)_VERSION := 8.0.3/' src/mingw-w64.mk
            sed -i 's/$(PKG)_CHECKSUM := f00cf1e2f975008855c93b9e0f8ec97decbf50f478e7ae4c7b5ffb9cdc54b743/$(PKG)_CHECKSUM := d702ef712c8f22035f81ddf6089542adf6bcb6ea669d4ebf4e311f87242882f0/' src/mingw-w64.mk

            echo "=== mingw-w64.mk (patched lines) ==="
            grep -n "PKG)_VERSION :=" src/mingw-w64.mk || true
            grep -n "PKG)_CHECKSUM :=" src/mingw-w64.mk || true
          fi

          export MXE_PLUGIN_DIRS="$PWD/plugins/gcc${{ inputs.GCC_VERSION }}"

          make MXE_TARGETS=i686-w64-mingw32.static JOBS=$(nproc) \
            gcc cmake \
            sdl sdl_net sdl_gfx sdl_mixer sdl_image \
            yaml-cpp jsoncpp

      - name: Show CMake log on failure
        if: failure()
        run: |
          echo "=== tail: mxe/log/cmake_x86_64-pc-linux-gnu ==="
          tail -n 200 mxe/log/cmake_x86_64-pc-linux-gnu || true

      - name: Upload MXE logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mxe-logs
          path: mxe/log