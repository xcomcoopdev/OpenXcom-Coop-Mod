name: Build WinXP (i686 static)

on:
  # Manual run (defaults to v8.4.2)
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag/branch/commit)"
        required: false
        default: "v8.4.2"

  # Also build automatically when pushing tags (optional)
  push:
    tags:
      - "v*"
      - "winxp-*"

jobs:
  mxe:
    uses: ./.github/workflows/build-mxe.yml
    with:
      MXE_VERSION: "7e39b555dee5e906b24a44940055dc28d4056d23"
      GCC_VERSION: "11"

  build:
    runs-on: ubuntu-22.04
    needs: [mxe]

    steps:
      - name: Restore MXE cache
        uses: actions/cache@v4
        with:
          path: /opt/mxe
          key: ${{ runner.os }}-mxe-v7e39b555dee5e906b24a44940055dc28d4056d23-gcc11-jsoncpp-sdl_net

      - name: Select ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            REF="${{ github.event.inputs.ref }}"
          else
            REF="${GITHUB_REF_NAME}"
          fi
          echo "REF=$REF" >> $GITHUB_ENV
          SAFE_REF="$(echo "$REF" | tr '/:' '__')"
          echo "SAFE_REF=$SAFE_REF" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF }}
          fetch-depth: 0
          submodules: recursive

      - name: Configure + build (WinXP)
        shell: bash
        run: |
          mkdir -p build
          cd build
          export PATH=/opt/mxe/usr/bin:$PATH
          i686-w64-mingw32.static-cmake -DCMAKE_BUILD_TYPE=Release -DDEV_BUILD=OFF -DBUILD_PACKAGE=OFF ..
          make -j"$(nproc)"

      - name: Package zip
        shell: bash
        run: |
          cd build/bin
          rm -f libopenxcom.dll.a
          zip -r "../../openxcom-winxp-${{ env.SAFE_REF }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openxcom-winxp-${{ env.SAFE_REF }}
          path: openxcom-winxp-${{ env.SAFE_REF }}.zip