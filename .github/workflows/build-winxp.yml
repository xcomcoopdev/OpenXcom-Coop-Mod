name: Build WinXP (i686 static)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag/branch/commit)"
        required: false
        default: "main"

  push:
    tags:
      - "v*"
      - "winxp-*"

jobs:
  mxe:
    uses: ./.github/workflows/build-mxe.yml
    with:
      MXE_VERSION: "7e39b555dee5e906b24a44940055dc28d4056d23"
      GCC_VERSION: "11"

  build:
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    needs: [mxe]

    defaults:
      run:
        shell: bash

    steps:
      - name: Install build tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git make zip ca-certificates

      - name: Select ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            REF="${{ github.event.inputs.ref }}"
          else
            REF="${GITHUB_REF_NAME}"
          fi
          echo "REF=$REF" >> $GITHUB_ENV
          SAFE_REF="$(echo "$REF" | tr '/:' '__')"
          echo "SAFE_REF=$SAFE_REF" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF }}
          fetch-depth: 0
          submodules: recursive

      - name: Restore MXE cache
        uses: actions/cache@v4
        with:
          path: mxe
          key: ${{ runner.os }}-mxe-v7e39b555dee5e906b24a44940055dc28d4056d23-gcc11-jsoncpp-sdl_net-v6

      - name: Configure + build (WinXP)
        run: |
          export PATH="$GITHUB_WORKSPACE/mxe/usr/bin:$PATH"
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/mxe/usr/i686-w64-mingw32.static/lib/pkgconfig"

          echo "=== DEBUG: workspace ==="
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/CMakeLists.txt" || true
          ls -la "$GITHUB_WORKSPACE/src/CMakeLists.txt" || true
          ls -la "$GITHUB_WORKSPACE/src/lodepng.cpp" || true

          echo "=== DEBUG: where is lodepng.cpp referenced? ==="
          grep -n "lodepng\.cpp" "$GITHUB_WORKSPACE/CMakeLists.txt" || true
          grep -n "lodepng\.cpp" "$GITHUB_WORKSPACE/src/CMakeLists.txt" || true

          echo "=== DEBUG: where is add_executable referenced? ==="
          grep -n "add_executable" "$GITHUB_WORKSPACE/CMakeLists.txt" || true
          grep -n "add_executable" "$GITHUB_WORKSPACE/src/CMakeLists.txt" || true

          mkdir -p build
          cd build

          # Use absolute source dir so CMake cannot pick the wrong top-level
          i686-w64-mingw32.static-cmake -DCMAKE_BUILD_TYPE=Release -DDEV_BUILD=OFF -DBUILD_PACKAGE=OFF "$GITHUB_WORKSPACE"
          make -j"$(nproc)"

      - name: Package zip
        run: |
          cd build/bin
          rm -f libopenxcom.dll.a || true
          zip -r "../../openxcom-winxp-${{ env.SAFE_REF }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openxcom-winxp-${{ env.SAFE_REF }}
          path: openxcom-winxp-${{ env.SAFE_REF }}.zip